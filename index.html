<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein GitHub Webradio</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #1db954; /* Spotify-Grün */
            --text-color: #ffffff;
            --text-muted: #b3b3b3;
            --error-color: #e91429;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .radio-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 1.2rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        /* Der interaktive Sender-Button */
        .current-station-trigger {
            background: #282828;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            font-size: 1.3rem;
            color: var(--accent-color);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .current-station-trigger:hover {
            background: #333;
            border-color: var(--accent-color);
        }

        .current-station-trigger::after {
            content: '▾';
            font-size: 1rem;
            color: var(--text-muted);
        }

        .status-msg {
            font-size: 0.85rem;
            color: var(--text-muted);
            min-height: 20px;
            margin-bottom: 25px;
        }

        .status-msg.error {
            color: var(--error-color);
            font-weight: bold;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        button.control-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        button.control-btn:hover {
            background-color: var(--accent-color);
            transform: scale(1.05);
        }

        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        input[type="range"] {
            accent-color: var(--accent-color);
            width: 60%;
            cursor: pointer;
        }

        /* OVERLAY / MODAL STYLING */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 400px;
            height: 80vh;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.4rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.8rem;
            cursor: pointer;
        }

        .close-btn:hover {
            color: var(--text-color);
        }

        /* Suchfeld */
        .search-input {
            width: 100%;
            padding: 12px;
            background: #282828;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .search-input:focus {
            outline: 1px solid var(--accent-color);
        }

        /* Scrollbare Senderliste */
        .station-list {
            flex: 1;
            overflow-y: auto;
            text-align: left;
            padding-right: 5px;
        }

        .station-item {
            padding: 14px 10px;
            border-bottom: 1px solid #282828;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 5px;
        }

        .station-item:hover {
            background-color: #2a2a2a;
        }

        .station-item.active {
            color: var(--accent-color);
            font-weight: bold;
            background-color: #222;
        }

        /* Scrollbar-Design */
        .station-list::-webkit-scrollbar {
            width: 6px;
        }
        .station-list::-webkit-scrollbar-thumb {
            background-color: #444;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="radio-container">
    <h1>WebRadio</h1>
    
    <div class="current-station-trigger" id="stationTrigger" onclick="openModal()">
        Lade Sender...
    </div>
    
    <div class="status-msg" id="statusMsg">Bereit</div>

    <audio id="audioPlayer"></audio>

    <div class="controls">
        <button class="control-btn" id="playBtn" onclick="togglePlay()">Play</button>
        <button class="control-btn" id="muteBtn" onclick="toggleMute()">Mute</button>
    </div>

    <div class="volume-container">
        <span>🔈</span>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5" oninput="changeVolume(this.value)">
        <span>🔊</span>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Sender wählen</h2>
            <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>
        
        <input type="text" class="search-input" id="searchInput" placeholder="Sender suchen..." oninput="filterStations()">
        
        <div class="station-list" id="stationList">
            </div>
    </div>
</div>

<script>
    const audio = document.getElementById('audioPlayer');
    const playBtn = document.getElementById('playBtn');
    const muteBtn = document.getElementById('muteBtn');
    const stationTrigger = document.getElementById('stationTrigger');
    const statusMsg = document.getElementById('statusMsg');
    const stationListContainer = document.getElementById('stationList');
    const volumeSlider = document.getElementById('volumeSlider');
    const modalOverlay = document.getElementById('modalOverlay');
    const searchInput = document.getElementById('searchInput');

    let stations = [];
    let currentStationIndex = null;
    let isMuted = false;
    let savedVolume = 0.5;

    audio.volume = savedVolume;

    // 1. Sender aus JSON laden
    async function loadStations() {
        try {
            const response = await fetch('stations.json');
            stations = await response.json();
            
            if (stations.length > 0) {
                renderStationList(stations);
                selectStation(0, false);
            } else {
                stationTrigger.innerText = "Keine Sender";
            }
        } catch (error) {
            console.error(error);
            stationTrigger.innerText = "Fehler";
            setStatus("Fehler beim Laden der stations.json", true);
        }
    }

    // 2. Senderliste rendern (wird auch für die Suche wiederverwendet)
    function renderStationList(stationsToRender) {
        stationListContainer.innerHTML = '';
        stationsToRender.forEach((station) => {
            // Finde den echten Index im Haupt-Array
            const realIndex = stations.findIndex(s => s.url === station.url);
            
            const div = document.createElement('div');
            div.className = 'station-item';
            if (realIndex === currentStationIndex) div.classList.add('active');
            div.innerText = station.name;
            div.onclick = () => {
                selectStation(realIndex, true);
                closeModal();
            };
            stationListContainer.appendChild(div);
        });
    }

    // 3. Suche/Filter-Funktion
    function filterStations() {
        const query = searchInput.value.toLowerCase();
        const filtered = stations.filter(station => 
            station.name.toLowerCase().includes(query)
        );
        renderStationList(filtered);
    }

    // 4. Sender auswählen
    function selectStation(index, shouldPlay = true) {
        currentStationIndex = index;
        const station = stations[index];
        
        stationTrigger.innerText = station.name;
        setStatus("Sender gewechselt");

        // UI-Klasse "active" in der Liste updaten
        Array.from(stationListContainer.children).forEach((child, i) => {
            child.classList.toggle('active', i === index);
        });
        
        audio.src = station.url;

        if (shouldPlay) {
            playRadio();
        } else {
            playBtn.innerText = 'Play';
            playBtn.style.backgroundColor = '#333';
        }
    }

    // 5. Play / Pause
    function togglePlay() {
        if (audio.paused) {
            playRadio();
        } else {
            pauseRadio();
        }
    }

    function playRadio() {
        setStatus("Verbinde zum Stream...");
        audio.load(); 
        audio.play().then(() => {
            playBtn.innerText = 'Pause';
            playBtn.style.backgroundColor = 'var(--accent-color)';
            setStatus("Live");
        }).catch(err => {
            console.error("Wiedergabefehler:", err);
            playBtn.innerText = 'Play';
            playBtn.style.backgroundColor = '#333';
            setStatus("Stream-Fehler oder Autoplay blockiert.", true);
        });
    }

    function pauseRadio() {
        audio.pause();
        playBtn.innerText = 'Play';
        playBtn.style.backgroundColor = '#333';
        setStatus("Pausiert");
    }

    // Helper für Statusnachrichten
    function setStatus(msg, isError = false) {
        statusMsg.innerText = msg;
        if (isError) {
            statusMsg.classList.add('error');
        } else {
            statusMsg.classList.remove('error');
        }
    }

    // Modal öffnen / schließen
    function openModal() {
        modalOverlay.classList.add('open');
        searchInput.value = ''; // Suche zurücksetzen beim Öffnen
        renderStationList(stations);
        searchInput.focus();
    }

    function closeModal() {
        modalOverlay.classList.remove('open');
    }

    function closeModalOnOverlay(e) {
        if (e.target === modalOverlay) closeModal();
    }

    // Lautstärke & Mute
    function toggleMute() {
        isMuted = !isMuted;
        audio.muted = isMuted;
        muteBtn.innerText = isMuted ? 'Unmute' : 'Mute';
        volumeSlider.value = isMuted ? 0 : audio.volume;
    }

    function changeVolume(value) {
        audio.volume = value;
        savedVolume = value;
        if (value == 0) {
            audio.muted = true;
            muteBtn.innerText = 'Unmute';
        } else {
            audio.muted = false;
            muteBtn.innerText = 'Mute';
            isMuted = false;
        }
    }

    window.onload = loadStations;
</script>
</body>
</html>
